# Allow these dependencies to run their install/build scripts.
# pnpm blocks build scripts by default; Astro/Vite need esbuild, and
# sharp is used for Astro's optional image optimization.
allowBuilds:
  esbuild: true
  sharp: true

# Force a patched esbuild (GHSA-g7r4-m6w7-qqqr; Vite/Astro otherwise
# resolve a vulnerable 0.27.x).
overrides:
  esbuild: ^0.28.1
